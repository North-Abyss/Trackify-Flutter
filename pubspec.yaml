name: test_100days
description: "A Flutter app for tracking progress and learning during the 100 Days of Code challenge."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5  # Used for storing simple key-value pairs locally on the device
  uuid: ^4.5.3                # Used for generating unique identifiers

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
