name: trackify
description: "A Flutter habit-tracking application built as a learning project during the 100 Days of Code challenge."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  dynamic_color: ^1.8.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5  # Used for storing simple key-value pairs locally on the device
  table_calendar: ^3.2.0
  uuid: ^4.5.3                # Used for generating unique identifiers

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Custom Themes:
  assets:
    - assets/custom_theme.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 
  web:
    generate: true
    image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
  macos:
    generate: true
    image_path: "assets/icon.png"