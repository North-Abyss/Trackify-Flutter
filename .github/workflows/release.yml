name: Trackify Cloud Compiler

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ==========================================
  # 🤖 JOB 1: ANDROID (Universal & Split APKs)
  # ==========================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs
        run: flutter build apk --split-per-abi --release

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  # ==========================================
  # 🪟 JOB 2: WINDOWS (.exe & .zip)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Inno Setup
        run: choco install innosetup

      - name: Build Windows Native App
        run: |
          flutter pub get
          flutter build windows --release

      - name: Create Portable Zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath trackify-windows-portable.zip

      - name: Package into .exe Installer
        run: |
          $issContent = @"
          [Setup]
          AppName=Trackify
          AppVersion=1.0.0
          DefaultDirName={autopf}\Trackify
          OutputDir=.\Output
          OutputBaseFilename=Trackify-Windows-Setup
          Compression=lzma
          SolidCompression=yes
          SetupIconFile=windows\runner\resources\app_icon.ico
          
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{autoprograms}\Trackify"; Filename: "{app}\trackify.exe"
          Name: "{autodesktop}\Trackify"; Filename: "{app}\trackify.exe"
          "@
          
          Set-Content -Path installer.iss -Value $issContent
          iscc installer.iss

      - name: Upload Windows Assets to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Output/Trackify-Windows-Setup.exe
            trackify-windows-portable.zip

  # ==========================================
  # 🐧 JOB 3: LINUX (.deb & .zip)
  # ==========================================
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter Linux App
        run: |
          flutter pub get
          flutter build linux --release

      - name: Create Portable Zip
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../trackify-linux-portable.zip .
          cd -
      
      - name: Package .deb file
        run: |
          # 1. Scaffold directories (NO MORE /opt! Only /usr!)
          mkdir -p deb-package/usr/lib/trackify
          mkdir -p deb-package/usr/bin
          mkdir -p deb-package/usr/share/applications
          mkdir -p deb-package/usr/share/icons/hicolor/1024x1024/apps
          mkdir -p deb-package/DEBIAN

          # 2. Copy App Bundle & Icon into /usr/lib and /usr/share
          cp -R build/linux/x64/release/bundle/* deb-package/usr/lib/trackify/
          cp assets/icon.png deb-package/usr/share/icons/hicolor/1024x1024/apps/trackify.png

          # 3. Create the global system command! 
          # CHANGED: Using a relative path fixes the "dangling symlink" error!
          ln -s ../lib/trackify/trackify deb-package/usr/bin/trackify

          # 4. Strict Linux Permissions
          # REMOVED the chmod for the symlink. We only need to chmod the actual app folder!
          chmod -R 755 deb-package/usr/lib/trackify/
          chmod 644 deb-package/usr/share/icons/hicolor/1024x1024/apps/trackify.png

          # 5. Create DEBIAN Control File
          cat <<EOF > deb-package/DEBIAN/control
          Package: trackify
          Version: 1.0.0
          Section: base
          Priority: optional
          Architecture: amd64
          Maintainer: Trackify Developer
          Description: Trackify - The Time Matrix. Track your habits beautifully.
          EOF

          # 6. Create Desktop Entry
          cat <<EOF > deb-package/usr/share/applications/trackify.desktop
          [Desktop Entry]
          Version=1.0
          Name=Trackify
          GenericName=Habit Tracker
          Icon=trackify
          Exec=trackify %U
          Terminal=false
          Type=Application
          Categories=Utility;Productivity;
          Keywords=Habit;Tracker;Productivity;Flutter;
          EOF

          # FIX MENU PERMISSIONS
          chmod 644 deb-package/usr/share/applications/trackify.desktop

          # 7. Build the package
          dpkg-deb --build deb-package trackify-linux-x64.deb

      - name: Upload Linux Assets to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            trackify-linux-x64.deb
            trackify-linux-portable.zip